name: Deploy SnapLink

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: snaplink-production
  cancel-in-progress: false

env:
  STACK_NAME: snaplink-production
  SAM_TEMPLATE: infrastructure/template.yaml

jobs:
  deploy:
    name: Deploy backend and frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AWS SAM CLI
        run: pip install --disable-pip-version-check aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate and build SAM application
        run: |
          sam validate --lint --template-file "$SAM_TEMPLATE"
          sam build --template-file "$SAM_TEMPLATE"

      - name: Deploy SAM application
        run: |
          sam deploy \
            --stack-name "$STACK_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --resolve-s3 \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Read stack outputs
        id: stack
        shell: bash
        run: |
          api_url=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          bucket=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          distribution=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          echo "api_url=$api_url" >> "$GITHUB_OUTPUT"
          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "distribution=$distribution" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build React frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ steps.stack.outputs.api_url }}
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Sync frontend to S3
        run: aws s3 sync frontend/dist "s3://${{ steps.stack.outputs.bucket }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ steps.stack.outputs.distribution }}" --paths "/*"

