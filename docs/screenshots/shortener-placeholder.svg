<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">SnapLink shortener placeholder</title>
  <desc id="desc">Illustrated placeholder for the SnapLink shortener screen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="120" y="120" width="1040" height="480" rx="28" fill="#161b22" stroke="#30363d"/>
  <text x="170" y="190" fill="#f8fafc" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">SnapLink Shortener</text>
  <text x="170" y="235" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">Create a compact link and copy it instantly.</text>
  <rect x="170" y="305" width="700" height="76" rx="20" fill="#0d1117" stroke="#334155"/>
  <text x="205" y="353" fill="#64748b" font-size="24" font-family="Consolas, monospace">https://your-very-long-url.com/goes-here</text>
  <rect x="900" y="305" width="210" height="76" rx="20" fill="#38bdf8"/>
  <text x="952" y="353" fill="#0f172a" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Shorten URL</text>
  <rect x="170" y="430" width="940" height="110" rx="22" fill="#0d1117" stroke="#334155"/>
  <text x="205" y="475" fill="#94a3b8" font-size="20" font-family="Segoe UI, Arial, sans-serif">Your short link</text>
  <text x="205" y="517" fill="#38bdf8" font-size="28" font-family="Consolas, monospace">https://snaplink.example/aZ91Kq</text>
  <text x="170" y="645" fill="#475569" font-size="20" font-family="Segoe UI, Arial, sans-serif">Replace this placeholder with a real product screenshot after deployment.</text>
</svg>
